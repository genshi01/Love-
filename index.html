<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Helloo</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700&family=Great+Vibes&display=swap" rel="stylesheet">
    
    <style>
        /* ===== CẤU HÌNH GIAO DIỆN CHÍNH ===== */
        :root {
            --primary-color: #ff3366; 
            --glow-color: rgba(255, 51, 102, 0.7);
            --bg-color: #0d010c;
            /* Màu Vàng Gold Luxury */
            --gold-gradient: linear-gradient(to bottom, #cfb53b 0%, #f7ef8a 50%, #ae8625 100%);
            --gold-shadow: 0 0 15px rgba(212, 175, 55, 0.6);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #bubble-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* ===== QUIZ BOX ===== */
        #quiz-part {
            position: relative;
            z-index: 100;
            background: rgba(20, 0, 15, 0.9);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid var(--primary-color);
            box-shadow: 0 0 30px var(--glow-color);
            width: 90%;
            max-width: 450px;
            text-align: center;
            opacity: 1;
            transition: opacity 1s ease;
        }

        h2 {
            font-family: 'Segoe UI', serif;
            color: #fff;
            margin-bottom: 30px;
            font-size: 1.5rem;
            text-shadow: 0 0 10px var(--primary-color);
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn {
            background-color: transparent;
            color: #fff;
            border: 2px solid var(--primary-color);
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background-color: var(--primary-color);
            box-shadow: 0 0 15px var(--primary-color);
            transform: scale(1.05);
        }

        /* ===== RESULT AREA (GOLD LUXURY) ===== */
        #result-part {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 50;
        }

        #heart-svg {
            width: 180px;
            fill: #d4af37; /* Màu vàng đồng cho trái tim */
            margin-bottom: 30px;
            animation: pulse-glow-gold 1.5s ease-in-out infinite;
        }

        #typing-area {
            font-family: 'Great Vibes', cursive;
            font-size: 4rem; /* Tăng kích thước cho sang trọng */
            font-weight: bold;
            text-align: center;
            /* Tạo hiệu ứng chữ vàng kim loại */
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.5));
            text-shadow: var(--gold-shadow);
        }

        .cursor {
            display: inline-block;
            width: 3px;
            height: 50px;
            background-color: #f7ef8a;
            margin-left: 5px;
            box-shadow: 0 0 10px #f7ef8a;
            animation: blink-cursor 0.7s infinite;
            vertical-align: middle;
        }

        /* ===== ANIMATIONS ===== */
        @keyframes pulse-glow-gold {
            0% { transform: scale(1); filter: drop-shadow(0 0 5px #ae8625); }
            50% { transform: scale(1.1); filter: drop-shadow(0 0 20px #f7ef8a); }
            100% { transform: scale(1); filter: drop-shadow(0 0 5px #ae8625); }
        }

        @keyframes blink-cursor { 50% { opacity: 0; } }

        @keyframes bubble-rise {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="quiz-part">
        <h2 id="question-text">Câu 1: Điều bạn thích làm nhất?</h2>
        <div class="options-grid" id="options"></div>
    </div>

    <div id="bubble-background"></div>

    <div id="result-part">
        <svg id="heart-svg" viewBox="0 0 32 29.6">
            <path d="M23.6,0c-3.4,0-6.3,2.7-7.6,5.6C14.7,2.7,11.8,0,8.4,0C3.8,0,0,3.8,0,8.4c0,9.4,9.5,11.9,16,21.2
            c6.1-9.3,16-12.1,16-21.2C32,3.8,28.2,0,23.6,0z"/>
        </svg>
        <div>
            <span id="typing-area"></span><span class="cursor" id="cursor"></span>
        </div>
    </div>

<script>
    let currentStep = 0;
    const quizData = [
        { q: "Câu 1: Sở thích lãng mạn của bạn?", a: ["🍿 Xem phim", "☕ Café", "🚶 Đi dạo", "🏖️ Đi biển"] },
        { q: "Câu 2: Bạn thích món ăn nào nhất?", a: ["🍕 Pizza", "🍣 Sushi", "🍔 Burger", "🍜 Phở"] },
        { q: "Câu 3: Bạn sinh năm bao nhiêu?", a: ["2011", "2012", "2013", "2014"], correct: "2012" }
    ];

    function loadQuestion() {
        const data = quizData[currentStep];
        document.getElementById('question-text').innerText = data.q;
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        data.a.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.innerText = opt;
            btn.onclick = () => {
                if(currentStep === 2 && opt !== data.correct) {
                    alert("Ơ kìa, chọn lại cho đúng định mệnh đi chứ! 😉");
                } else {
                    currentStep++;
                    if(currentStep < quizData.length) loadQuestion();
                    else startSurprise();
                }
            };
            optionsDiv.appendChild(btn);
        });
    }

    function startSurprise() {
        const quizDiv = document.getElementById('quiz-part');
        quizDiv.style.opacity = '0';
        setTimeout(() => {
            quizDiv.style.display = 'none';
            document.getElementById('result-part').style.display = 'flex';
            startTyping();
        }, 1000);
    }

    // --- CẬP NHẬT NỘI DUNG CHỮ TẠI ĐÂY ---
    function startTyping() {
        const text = "I Love You..."; // Nội dung rút gọn theo yêu cầu
        let i = 0;
        const typingSpeed = 150; 

        function type() {
            if (i < text.length) {
                document.getElementById('typing-area').innerHTML += text.charAt(i);
                i++;
                setTimeout(type, typingSpeed);
            }
        }
        type();
    }

    function createBackgroundEffect() {
        const background = document.getElementById('bubble-background');
        const count = 15;
        for(let i = 0; i < count; i++) {
            const item = document.createElement('div');
            item.innerHTML = Math.random() < 0.5 ? '✨' : '⭐'; // Đổi sang sao cho hợp tone Gold
            item.style.position = 'absolute';
            item.style.fontSize = (Math.random() * 1.5 + 0.5) + 'rem';
            item.style.color = '#f7ef8a';
            item.style.opacity = '0.4';
            item.style.left = (Math.random() * 100) + 'vw';
            item.style.animation = `bubble-rise ${(Math.random() * 6 + 6)}s linear infinite`;
            item.style.animationDelay = (Math.random() * 8) + 's';
            background.appendChild(item);
        }
    }

    loadQuestion();
    createBackgroundEffect();
</script>
</body>
</html>
